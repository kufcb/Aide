<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #fff;
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            color: #333;
        }

        .mode-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #666;
        }

        .mode-toggle input[type="checkbox"] {
            width: 44px;
            height: 24px;
            appearance: none;
            background: #ddd;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .mode-toggle input[type="checkbox"]::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .mode-toggle input[type="checkbox"]:checked {
            background: #4CAF50;
        }

        .mode-toggle input[type="checkbox"]:checked::after {
            transform: translateX(20px);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            display: flex;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #4CAF50;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.assistant.streaming .message-content::after {
            content: '▊';
            animation: blink 1s infinite;
            color: #4CAF50;
            margin-left: 4px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .input-container {
            background: white;
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-wrapper input:focus {
            border-color: #4CAF50;
        }

        .input-wrapper button {
            padding: 12px 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .input-wrapper button:hover:not(:disabled) {
            background: #45a049;
        }

        .input-wrapper button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Your Aide !</h1>
        <div class="mode-toggle">
            <span>普通模式</span>
            <!-- checked -->
            <input type="checkbox" id="streamMode" checked>
            <span>流式模式</span>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <!-- 消息会在这里显示 -->
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="输入消息..." 
                autocomplete="off"
            >
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const streamModeCheckbox = document.getElementById('streamMode');

        let isLoading = false;

        // 回车发送
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isLoading) {
                sendMessage();
            }
        });

        function addMessage(content, isUser = false, isStreaming = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'} ${isStreaming ? 'streaming' : ''}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return { messageDiv, contentDiv };
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = '❌ ' + message;
            chatContainer.appendChild(errorDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            setTimeout(() => errorDiv.remove(), 5000);
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;
            messageInput.value = '';

            // 添加用户消息
            addMessage(message, true);

            const isStreamMode = streamModeCheckbox.checked;

            try {
                if (isStreamMode) {
                    await sendStreamRequest(message);
                } else {
                    await sendNormalRequest(message);
                }
            } catch (error) {
                showError(error.message);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        // 普通模式请求
        async function sendNormalRequest(message) {
            const response = await fetch(`${API_BASE_URL}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ msg: message })
            });

            if (!response.ok) {
                throw new Error(`请求失败: ${response.status}`);
            }

            const data = await response.json();
            addMessage(data);
        }

        // 流式模式请求 - 使用 LangGraph Agent（支持思考过程显示）
        async function sendStreamRequest(message) {
            const { messageDiv, contentDiv } = addMessage('', false, true);
            
            // 创建思考区域和答案区域
            const thoughtDiv = document.createElement('div');
            thoughtDiv.className = 'thought-process';
            thoughtDiv.style.cssText = 'color: #888; font-size: 13px; margin-bottom: 10px; padding: 8px 12px; background: #f5f5f5; border-radius: 8px; display: none;';
            
            const answerDiv = document.createElement('div');
            answerDiv.className = 'answer-content';
            
            contentDiv.innerHTML = '';
            contentDiv.appendChild(thoughtDiv);
            contentDiv.appendChild(answerDiv);

            const response = await fetch(`${API_BASE_URL}/chat/stream`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ msg: message })
            });

            if (!response.ok) {
                throw new Error(`请求失败: ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            
            let buffer = '';
            let currentThought = '';
            let currentAnswer = '';
            let inThought = false;
            let inAnswer = false;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                buffer += chunk;
                
                // 解析标记
                while (buffer.length > 0) {
                    if (!inThought && !inAnswer) {
                        // 查找开始标记
                        const thoughtStart = buffer.indexOf('[THOUGHT_START]|||');
                        const answerStart = buffer.indexOf('[ANSWER_START]|||');
                        
                        if (thoughtStart !== -1) {
                            inThought = true;
                            buffer = buffer.substring(thoughtStart + '[THOUGHT_START]|||'.length);
                            thoughtDiv.style.display = 'block';
                        } else if (answerStart !== -1) {
                            inAnswer = true;
                            buffer = buffer.substring(answerStart + '[ANSWER_START]|||'.length);
                        } else {
                            // 没有完整标记，保留缓冲区
                            break;
                        }
                    } else if (inThought) {
                        // 查找思考结束标记
                        const thoughtEnd = buffer.indexOf('|||[THOUGHT_END]');
                        if (thoughtEnd !== -1) {
                            currentThought += buffer.substring(0, thoughtEnd);
                            thoughtDiv.textContent = currentThought;
                            buffer = buffer.substring(thoughtEnd + '|||[THOUGHT_END]'.length);
                            inThought = false;
                        } else {
                            // 还没有结束标记，显示当前内容
                            currentThought += buffer;
                            thoughtDiv.textContent = currentThought;
                            buffer = '';
                        }
                    } else if (inAnswer) {
                        // 查找答案结束标记
                        const answerEnd = buffer.indexOf('|||[ANSWER_END]');
                        if (answerEnd !== -1) {
                            currentAnswer += buffer.substring(0, answerEnd);
                            answerDiv.textContent = currentAnswer;
                            buffer = buffer.substring(answerEnd + '|||[ANSWER_END]'.length);
                            inAnswer = false;
                        } else {
                            // 还没有结束标记，显示当前内容
                            currentAnswer += buffer;
                            answerDiv.textContent = currentAnswer;
                            buffer = '';
                        }
                    }
                }
                
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            // 移除流式状态
            messageDiv.classList.remove('streaming');
        }
    </script>
</body>
</html>
